<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1B3A5C" />
  <meta name="description" content="Agenda de reservas do Sítio Mirante Céu Azul. Confira datas disponíveis para seu evento." />
  <title>Agenda · Mirante Céu Azul</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo" aria-label="Sítio Mirante Céu Azul — página inicial">
        <img class="logo-img" src="/icons/logo-mirante.png" alt="Sítio Mirante Céu Azul" />
      </a>
      <div class="header-actions">
        <a href="/admin" class="btn btn-ghost btn-icone" aria-label="Painel administrativo" title="Painel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="aviso-mock" class="aviso oculto">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span><strong>Modo demonstração.</strong> Eventos exibidos são fictícios. Configure o Google Calendar pra usar dados reais.</span>
    </div>

    <div style="text-align:center; margin: 0.5rem 0 1.5rem;">
      <span class="section-tag">Agenda</span>
      <h1 class="display" style="font-size: clamp(1.5rem, 4vw, 2rem); margin:0.25rem 0 0.5rem;">Datas disponíveis</h1>
      <div class="ornamento" aria-hidden="true"><div class="ornamento-diamante"></div></div>
    </div>

    <section class="card">
      <div class="calendario-titulo">
        <h2 id="calendario-mes" class="calendario-mes">—</h2>
        <div class="calendario-controles">
          <button id="btn-anterior" class="btn btn-secundario btn-icone" aria-label="Mês anterior">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button id="btn-hoje" class="btn btn-secundario btn-sm">Hoje</button>
          <button id="btn-proximo" class="btn btn-secundario btn-icone" aria-label="Próximo mês">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      <div id="estado-calendario" class="oculto" aria-live="polite"></div>
      <div id="calendario-grid" class="calendario-grid" role="grid" aria-label="Grade do mês"></div>

      <div class="calendario-legenda">
        <span class="legenda-item"><span class="legenda-cor legenda-cor--livre"></span>Disponível</span>
        <span class="legenda-item"><span class="legenda-cor legenda-cor--reservado"></span>Reservado</span>
        <span class="legenda-item"><span class="legenda-cor legenda-cor--bloqueado"></span>Indisponível</span>
        <span class="legenda-item"><span class="legenda-cor legenda-cor--hoje"></span>Hoje</span>
      </div>
    </section>

    <p style="text-align:center;color:var(--texto-suave);margin:1.5rem 0 0;font-size:0.875rem">
      Toque em uma data para mais detalhes ou para entrar em contato.
    </p>
  </main>

  <script src="/js/calendar-shared.js"></script>
  <script src="/js/calendar.js"></script>
  <script src="/js/pwa.js"></script>
</body>
</html>
