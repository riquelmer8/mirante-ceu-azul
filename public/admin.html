<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1B3A5C" />
  <title>Painel · Mirante Céu Azul</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo" aria-label="Sítio Mirante Céu Azul">
        <img class="logo-img" src="/icons/logo-mirante.png" alt="Sítio Mirante Céu Azul" />
        <span class="logo-sub">Painel</span>
      </a>
      <div class="header-actions">
        <button id="btn-push" class="btn btn-ghost btn-icone oculto" aria-label="Ativar notificações" title="Ativar notificações">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button id="btn-sincronizar" class="btn btn-ghost btn-icone" aria-label="Atualizar agenda" title="Atualizar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button id="btn-logout" class="btn btn-ghost btn-icone" aria-label="Sair" title="Sair">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="aviso-mock" class="aviso oculto">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="flex-shrink:0;margin-top:1px"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span><strong>Modo demonstração.</strong> Configure <code>GOOGLE_CALENDAR_ID</code> e <code>GOOGLE_SERVICE_ACCOUNT_JSON</code> pra sincronizar.</span>
    </div>

    <!-- Resumo financeiro -->
    <section class="resumo-financeiro" aria-label="Resumo do mês">
      <div class="resumo-card resumo-card--confirmado">
        <div class="resumo-rotulo">Confirmado</div>
        <div class="resumo-valor" id="resumo-confirmado">R$ —</div>
        <div class="resumo-detalhe" id="resumo-confirmado-detalhe">— eventos</div>
      </div>
      <div class="resumo-card resumo-card--pago">
        <div class="resumo-rotulo">Recebido</div>
        <div class="resumo-valor" id="resumo-pago">R$ —</div>
        <div class="resumo-detalhe" id="resumo-pago-detalhe">a receber: R$ —</div>
      </div>
      <div class="resumo-card resumo-card--projetado">
        <div class="resumo-rotulo">Projetado</div>
        <div class="resumo-valor" id="resumo-projetado">R$ —</div>
        <div class="resumo-detalhe" id="resumo-projetado-detalhe">com orçamentos</div>
      </div>
      <div class="resumo-card resumo-card--eventos">
        <div class="resumo-rotulo">Eventos no mês</div>
        <div class="resumo-valor" id="resumo-eventos">—</div>
        <div class="resumo-detalhe" id="resumo-eventos-detalhe">—</div>
      </div>
    </section>

    <div style="display:flex;justify-content:space-between;align-items:center;gap:0.75rem;margin-bottom:1.25rem;flex-wrap:wrap">
      <div>
        <span class="section-tag">Agenda</span>
        <h1 style="font-size:1.5rem; margin:0.125rem 0 0;">Reservas do mês</h1>
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
        <button id="btn-bloquear" class="btn btn-secundario">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Bloquear data
        </button>
        <button id="btn-nova-reserva" class="btn btn-primario">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova reserva
        </button>
      </div>
    </div>

    <div class="painel-grade">
      <section class="card">
        <div class="calendario-titulo">
          <h2 id="calendario-mes" class="calendario-mes">—</h2>
          <div class="calendario-controles">
            <button id="btn-anterior" class="btn btn-secundario btn-icone" aria-label="Mês anterior">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button id="btn-hoje" class="btn btn-secundario btn-sm">Hoje</button>
            <button id="btn-proximo" class="btn btn-secundario btn-icone" aria-label="Próximo mês">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>

        <div id="estado-calendario" class="oculto" aria-live="polite"></div>
        <div id="calendario-grid" class="calendario-grid" role="grid" aria-label="Grade do mês"></div>

        <div class="calendario-legenda">
          <span class="legenda-item"><span class="legenda-cor" style="background:var(--tipo-casamento-bg);border-color:rgba(196,144,48,.35)"></span>Casamento</span>
          <span class="legenda-item"><span class="legenda-cor" style="background:var(--tipo-aniversario-bg);border-color:rgba(184,92,87,.35)"></span>Aniversário</span>
          <span class="legenda-item"><span class="legenda-cor" style="background:var(--tipo-corporativo-bg);border-color:rgba(27,58,92,.30)"></span>Corporativo</span>
          <span class="legenda-item"><span class="legenda-cor legenda-cor--bloqueado"></span>Bloqueado</span>
        </div>
      </section>

      <aside class="card">
        <h2 class="proximas-titulo">Reservas</h2>
        <div class="filtros">
          <div class="filtros-busca">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="filtro-busca" type="search" placeholder="Buscar por nome do cliente…" autocomplete="off" />
          </div>
          <div class="filtros-pills" role="group" aria-label="Filtrar por status">
            <button class="pill pill--ativo" data-status="todos">Todos</button>
            <button class="pill" data-status="orcamento">Orçamento</button>
            <button class="pill" data-status="confirmada">Confirmada</button>
            <button class="pill" data-status="paga">Paga</button>
            <button class="pill" data-status="realizada">Realizada</button>
          </div>
          <select id="filtro-periodo" class="filtros-periodo" aria-label="Período">
            <option value="7">Próximos 7 dias</option>
            <option value="15">Próximos 15 dias</option>
            <option value="30" selected>Próximos 30 dias</option>
            <option value="90">Próximos 90 dias</option>
            <option value="365">Próximo ano</option>
          </select>
        </div>
        <ul id="proximas-lista" class="proximas-lista"></ul>
      </aside>
    </div>
  </main>

  <script src="/js/calendar-shared.js"></script>
  <script src="/js/admin.js"></script>
  <script src="/js/pwa.js"></script>
</body>
</html>
